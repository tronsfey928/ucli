# CI: lint + test on every push to main
# Publish: ucli-server + ucli to npm when a GitHub Release is created
#
# Notes:
#   - Only @tronsfey/ucli-server and @tronsfey/ucli are published here.
#     @tronsfey/mcp2cli and @tronsfey/openapi2cli have independent release cycles.
#   - mcp2cli must be built before lint/test/publish because @tronsfey/ucli
#     references it via workspace:* and imports from its dist/ at bundle time.

name: Node.js Package

on:
  release:
    types: [created]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build mcp2cli workspace source first — CLI bundler (tsup) imports from its dist/
      - run: pnpm --filter @tronsfey/mcp2cli build
      - run: pnpm lint
      - run: pnpm test

  publish-npm:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build mcp2cli first — required by @tronsfey/ucli prepack (tsup bundles it)
      - run: pnpm --filter @tronsfey/mcp2cli build
      # Publish product packages only (prepack scripts handle their own builds)
      - run: pnpm --filter @tronsfey/ucli-server publish --access public --no-git-checks
      - run: pnpm --filter @tronsfey/ucli publish --access public --no-git-checks
